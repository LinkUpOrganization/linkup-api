# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - linkup

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # 1. Відновлюємо залежності для всього рішення (рекомендовано для Clean Architecture)
      - name: dotnet restore
        run: dotnet restore

      # 2. Білдимо конкретно веб-проєкт (вказуємо шлях до .csproj)
      - name: Build with dotnet
        run: dotnet build src/Web/Web.csproj --configuration Release --no-restore

      # 3. Публікуємо веб-проєкт в папку 'myapp'
      - name: dotnet publish
        run: dotnet publish src/Web/Web.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish # Завантажуємо в конкретну папку для чистоти
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8B4BEBD3C6124DD4A763FAD7895014C0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2DBC1B7B6A774C398BA6223B44DEC059 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_38932DE2AF1140DC96E26F9DE68A97F5 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'linkup'
          slot-name: 'Production'
          package: ./publish # Вказуємо папку, куди завантажили артефакт
